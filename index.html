<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steamrip Hub | Infinite Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <style>
        :root { --bg: #0b0f1a; --card: #161b2c; --accent: #38bdf8; --text: #f1f5f9; --success: #22c55e; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; min-height: 100vh; }
        
        .header-sticky { position: sticky; top: 0; background: var(--bg); z-index: 1000; padding: 15px; text-align: center; border-bottom: 1px solid #2d3748; }
        .header-sticky h1 { font-size: 1.8rem; margin: 0; color: var(--accent); }
        input { width: 90%; max-width: 500px; padding: 12px 20px; background: #000; border: 1px solid #2d3748; border-radius: 25px; color: white; outline: none; margin-top: 10px; }

        #results { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 20px; padding: 20px; max-width: 1400px; margin: 0 auto; 
        }
        
        .game-item { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #2d3748; cursor: pointer; transition: 0.2s; }
        .game-item:hover { border-color: var(--accent); transform: translateY(-3px); }
        .game-cover { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: #1e293b; }
        .game-content { padding: 15px; }
        .game-title { font-weight: 700; font-size: 14px; margin-bottom: 10px; height: 35px; overflow: hidden; }
        
        .details { display: none; padding-top: 10px; border-top: 1px solid #2d3748; font-size: 11px; color: #94a3b8; }
        .details.active { display: block; }
        .dl-button { display: block; text-align: center; padding: 8px; background: var(--success); color: white; text-decoration: none; border-radius: 6px; font-weight: 800; margin-top: 10px; }

        #sentinel { height: 150px; display: flex; align-items: center; justify-content: center; width: 100%; font-weight: bold; color: var(--accent); }
    </style>
</head>
<body>

    <div class="header-sticky">
        <h1>Steamrip Hub</h1>
        <input type="text" id="searchBox" placeholder="Search games...">
    </div>

    <div id="results"></div>
    <div id="sentinel">Scroll down to load more...</div>

    <script>
        let allGames = [];
        let filteredGames = [];
        let fuse;
        let currentIndex = 0;
        const itemsPerPage = 20;
        const imageCache = JSON.parse(localStorage.getItem('steam_cache_v6') || '{}');

        // Load JSON
        fetch('steamrip_games.json')
            .then(res => res.json())
            .then(data => {
                allGames = data.downloads;
                filteredGames = allGames;
                fuse = new Fuse(allGames, { keys: ['title'], threshold: 0.4 });
                loadNextBatch();
            });

        // RE-ENGINEERED SCROLL SYSTEM
        window.addEventListener('scroll', () => {
            const { scrollTop, scrollHeight, clientHeight } = document.documentElement;
            // If we are within 500px of the bottom, load more
            if (scrollTop + clientHeight >= scrollHeight - 500) {
                loadNextBatch();
            }
        });

        function loadNextBatch() {
            if (currentIndex >= filteredGames.length) {
                document.getElementById('sentinel').innerText = "End of Database";
                return;
            }
            const nextBatch = filteredGames.slice(currentIndex, currentIndex + itemsPerPage);
            renderGames(nextBatch, currentIndex);
            currentIndex += itemsPerPage;
        }

        function cleanName(title) {
            return title.replace(/Free Download/gi, '').replace(/\(.*\)/g, '').replace(/\[.*\]/g, '').split(':')[0].trim();
        }

        async function updateImage(imgElement, title) {
            const name = cleanName(title);
            if (imageCache[name]) { imgElement.src = imageCache[name]; return; }

            try {
                const url = `https://api.allorigins.win/get?url=${encodeURIComponent('https://store.steampowered.com/api/storesearch/?term=' + name)}`;
                const res = await fetch(url);
                const data = await res.json();
                const contents = JSON.parse(data.contents);
                if (contents.items && contents.items.length > 0) {
                    const img = `https://images.weserv.nl/?url=cdn.cloudflare.steamstatic.com/steam/apps/${contents.items[0].id}/header.jpg`;
                    imageCache[name] = img;
                    localStorage.setItem('steam_cache_v6', JSON.stringify(imageCache));
                    imgElement.src = img;
                } else { throw new Error(); }
            } catch (e) {
                imgElement.src = `https://placehold.co/600x400/161b2c/38bdf8?text=${name.charAt(0)}`;
            }
        }

        function renderGames(games, baseIndex) {
            const container = document.getElementById('results');
            games.forEach((g, i) => {
                const idx = baseIndex + i;
                const div = document.createElement('div');
                div.className = 'game-item';
                div.innerHTML = `
                    <img class="game-cover" id="img-${idx}" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=">
                    <div class="game-content">
                        <div class="game-title">${g.title.replace(' Free Download', '')}</div>
                        <div id="details-${idx}" class="details">
                            <div>Size: ${g.file_size}</div>
                            <a href="${g.download_urls[0]}" target="_blank" class="dl-button">Download</a>
                        </div>
                    </div>
                `;
                div.onclick = () => document.getElementById(`details-${idx}`).classList.toggle('active');
                container.appendChild(div);

                // Use a standard observer for images (works better than scrolling observer)
                const observer = new IntersectionObserver((entries) => {
                    if (entries[0].isIntersecting) {
                        updateImage(document.getElementById(`img-${idx}`), g.title);
                        observer.disconnect();
                    }
                });
                observer.observe(div);
            });
        }

        searchBox.addEventListener('input', (e) => {
            currentIndex = 0;
            document.getElementById('results').innerHTML = '';
            filteredGames = e.target.value.length < 2 ? allGames : fuse.search(e.target.value).map(r => r.item);
            loadNextBatch();
        });
    </script>
</body>
</html>
