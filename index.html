<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steamrip Database</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <style>
        :root { --bg: #0b0f1a; --card: #161b2c; --accent: #38bdf8; --text: #f1f5f9; --hover: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 800px; }
        
        /* Header & Search */
        .header { text-align: center; margin-bottom: 30px; }
        .search-area { display: flex; gap: 10px; margin-bottom: 20px; position: sticky; top: 10px; z-index: 10; }
        input { flex: 1; padding: 15px; background: var(--card); border: 2px solid #2d3748; border-radius: 12px; color: white; outline: none; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        input:focus { border-color: var(--accent); }
        .btn { padding: 10px 20px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-surprise { background: var(--accent); color: #000; }

        /* Daily Section */
        .section-title { font-size: 12px; text-transform: uppercase; color: #64748b; margin: 20px 0 10px; letter-spacing: 1px; }
        .daily-grid { display: grid; grid-gap: 10px; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); margin-bottom: 30px; }
        .daily-card { background: var(--card); padding: 10px; border-radius: 8px; font-size: 12px; cursor: pointer; border: 1px solid #2d3748; text-align: center; }

        /* Game Items & Dropdown */
        .game-item { background: var(--card); border-radius: 12px; margin-bottom: 10px; overflow: hidden; border: 1px solid #2d3748; transition: 0.3s; }
        .game-header { padding: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .game-header:hover { background: var(--hover); }
        .game-title { font-weight: 600; font-size: 16px; }
        
        .details { display: none; padding: 20px; background: #0f172a; border-top: 1px solid #2d3748; animation: slideDown 0.3s ease-out; }
        .details.active { display: block; }
        
        .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; font-size: 13px; }
        .meta-item span { color: #64748b; display: block; font-size: 11px; }
        
        .dl-button { display: block; text-align: center; padding: 12px; background: #22c55e; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 10px; }
        .dl-button:hover { background: #16a34a; }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Steamrip Browser 2.0</h1>
            <p style="color:#64748b">Instant database access with details</p>
        </div>

        <div class="section-title">Editor's Daily Choices</div>
        <div id="dailyGrid" class="daily-grid"></div>

        <div class="search-area">
            <input type="text" id="searchBox" placeholder="Search 10,000+ games (Fuzzy search enabled)...">
            <button class="btn btn-surprise" onclick="surpriseMe()">Surprise Me</button>
        </div>

        <div id="results"></div>
    </div>

    <script>
        let allGames = [];
        let fuse;

        // Load new JSON
        fetch('steamrip_games.json')
            .then(res => res.json())
            .then(data => {
                allGames = data.downloads; // Access the 'downloads' array
                fuse = new Fuse(allGames, { keys: ['title'], threshold: 0.35 });
                setupDaily();
            });

        function setupDaily() {
            const today = new Date().toDateString();
            let daily = JSON.parse(localStorage.getItem('daily_v2'));
            if (!daily || daily.date !== today) {
                const shuffled = [...allGames].sort(() => 0.5 - Math.random());
                daily = { date: today, games: shuffled.slice(0, 4) };
                localStorage.setItem('daily_v2', JSON.stringify(daily));
            }
            renderGames(daily.games, document.getElementById('dailyGrid'), true);
        }

        function surpriseMe() {
            const random = allGames[Math.floor(Math.random() * allGames.length)];
            const results = document.getElementById('results');
            results.innerHTML = ""; // Clear current
            renderGames([random], results);
            toggleDetails(document.getElementById('details-0')); // Auto open
        }

        const searchBox = document.getElementById('searchBox');
        searchBox.addEventListener('input', (e) => {
            const query = e.target.value;
            if (query.length < 2) { document.getElementById('results').innerHTML = ''; return; }
            const results = fuse.search(query).slice(0, 15);
            renderGames(results.map(r => r.item), document.getElementById('results'));
        });

        function renderGames(games, container, isDaily = false) {
            container.innerHTML = games.map((g, i) => `
                <div class="game-item">
                    <div class="game-header" onclick="toggleDetails('details-${isDaily ? 'd' : ''}${i}')">
                        <span class="game-title">${g.title.replace(' Free Download', '')}</span>
                        <span style="color:var(--accent)">${isDaily ? '' : '▼'}</span>
                    </div>
                    <div id="details-${isDaily ? 'd' : ''}${i}" class="details">
                        <div class="meta-grid">
                            <div class="meta-item"><span>VERSION</span>${g.version || 'N/A'}</div>
                            <div class="meta-item"><span>SIZE</span>${g.file_size || 'Unknown'}</div>
                            <div class="meta-item"><span>GENRE</span>${g.genre || 'Various'}</div>
                            <div class="meta-item"><span>UPLOADED</span>${new Date(g.upload_date).toLocaleDateString()}</div>
                        </div>
                        ${g.download_urls.map(url => `
                            <a href="${url}" target="_blank" class="dl-button">Download via Megadb</a>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function toggleDetails(id) {
            const el = document.getElementById(id);
            const isVisible = el.classList.contains('active');
            // Close others
            document.querySelectorAll('.details').forEach(d => d.classList.remove('active'));
            if (!isVisible) el.classList.add('active');
        }
    </script>
</body>
</html>
