<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steamrip Hub | Infinite Discovery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <style>
        :root { 
            --bg: #0b0f1a; --card: #161b2c; --accent: #38bdf8; 
            --text: #f1f5f9; --hover: #1e293b; --success: #22c55e;
        }

        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); 
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 1000px; }
        
        /* Sticky Header like YouTube */
        .header-sticky {
            position: sticky; top: 0; background: var(--bg); z-index: 1000;
            padding: 10px 0 20px 0; width: 100%; display: flex; flex-direction: column; align-items: center;
        }

        .header-sticky h1 { font-size: 2rem; margin: 0; color: var(--accent); cursor: pointer; }

        .search-area { 
            display: flex; gap: 12px; width: 100%; max-width: 600px; margin-top: 15px;
        }
        
        input { 
            flex: 1; padding: 14px; background: var(--card); border: 2px solid #2d3748; 
            border-radius: 25px; color: white; outline: none; font-size: 16px;
        }
        input:focus { border-color: var(--accent); }

        /* Game Grid */
        #results { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 20px; margin-top: 20px;
        }
        
        .game-item { 
            background: var(--card); border-radius: 12px; overflow: hidden; 
            border: 1px solid #2d3748; transition: 0.2s; cursor: pointer;
            display: flex; flex-direction: column;
        }
        .game-item:hover { transform: scale(1.03); border-color: var(--accent); z-index: 10; }

        .game-cover { width: 100%; height: 120px; object-fit: cover; background: #1e293b; }

        .game-content { padding: 12px; flex-grow: 1; }
        .game-title { font-weight: 700; font-size: 14px; line-height: 1.2; margin-bottom: 8px; }
        
        .details { display: none; padding-top: 10px; border-top: 1px solid #2d3748; font-size: 11px; }
        .details.active { display: block; }
        
        .dl-button { 
            display: block; text-align: center; padding: 8px; background: var(--success); 
            color: white; text-decoration: none; border-radius: 6px; font-weight: 800; margin-top: 10px;
        }

        /* Loading Spinner at the bottom */
        #sentinel { height: 100px; display: flex; align-items: center; justify-content: center; width: 100%; color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-sticky">
            <h1 onclick="window.scrollTo({top: 0, behavior: 'smooth'})">Steamrip Hub</h1>
            <div class="search-area">
                <input type="text" id="searchBox" placeholder="Search for games...">
            </div>
        </div>

        <div id="results"></div>
        <div id="sentinel">Loading more games...</div>
    </div>

    <script>
        let allGames = [];
        let filteredGames = [];
        let fuse;
        let currentIndex = 0;
        const itemsPerPage = 24;
        const imageCache = JSON.parse(localStorage.getItem('steam_image_cache') || '{}');

        // Load Data
        fetch('steamrip_games.json')
            .then(res => res.json())
            .then(data => {
                allGames = data.downloads;
                filteredGames = allGames; // Default is the full order
                fuse = new Fuse(allGames, { keys: ['title', 'genre'], threshold: 0.3 });
                loadNextBatch();
            });

        // Infinite Scroll Logic (Intersection Observer)
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting) {
                loadNextBatch();
            }
        }, { rootMargin: '200px' });

        observer.observe(document.getElementById('sentinel'));

        function loadNextBatch() {
            if (currentIndex >= filteredGames.length) {
                document.getElementById('sentinel').innerText = "You've reached the end!";
                return;
            }

            const nextBatch = filteredGames.slice(currentIndex, currentIndex + itemsPerPage);
            renderGames(nextBatch, false); // false = append to existing
            currentIndex += itemsPerPage;
        }

        // Search Logic (Resets the infinite scroll)
        const searchBox = document.getElementById('searchBox');
        searchBox.addEventListener('input', (e) => {
            const query = e.target.value;
            currentIndex = 0;
            document.getElementById('results').innerHTML = '';
            
            if (query.length < 2) { 
                filteredGames = allGames;
            } else {
                filteredGames = fuse.search(query).map(r => r.item);
            }
            loadNextBatch();
        });

        async function updateImage(imgElement, title) {
            const cleanTitle = title.split(' Free Download')[0].split('(')[0].trim();
            if (imageCache[cleanTitle]) { imgElement.src = imageCache[cleanTitle]; return; }

            try {
                const searchUrl = `https://api.allorigins.win/get?url=${encodeURIComponent('https://store.steampowered.com/api/storesearch/?term=' + cleanTitle + '&l=english&cc=US')}`;
                const response = await fetch(searchUrl);
                const data = await response.json();
                const steamResult = JSON.parse(data.contents);
                if (steamResult.items && steamResult.items.length > 0) {
                    const finalImg = `https://images.weserv.nl/?url=cdn.cloudflare.steamstatic.com/steam/apps/${steamResult.items[0].id}/header.jpg`;
                    imageCache[cleanTitle] = finalImg;
                    localStorage.setItem('steam_image_cache', JSON.stringify(imageCache));
                    imgElement.src = finalImg;
                } else { throw new Error(); }
            } catch (e) {
                imgElement.src = `https://placehold.co/600x400/1e293b/38bdf8?text=${cleanTitle.charAt(0)}`;
            }
        }

        function renderGames(games, clear = false) {
            const container = document.getElementById('results');
            if (clear) container.innerHTML = '';

            games.forEach((g, i) => {
                const localIdx = currentIndex + i;
                const div = document.createElement('div');
                div.className = 'game-item';
                div.onclick = () => toggleDetails(`details-${localIdx}`);
                div.innerHTML = `
                    <img class="game-cover" id="img-${localIdx}" src="https://placehold.co/600x300/161b2c/161b2c?text=..." alt="cover">
                    <div class="game-content">
                        <div class="game-title">${g.title.replace(' Free Download', '')}</div>
                        <div id="details-${localIdx}" class="details">
                            <div>Size: ${g.file_size}</div>
                            <div>Genre: ${g.genre}</div>
                            <a href="${g.download_urls[0]}" target="_blank" class="dl-button">Download</a>
                        </div>
                    </div>
                `;
                container.appendChild(div);
                updateImage(document.getElementById(`img-${localIdx}`), g.title);
            });
        }

        function toggleDetails(id) {
            const el = document.getElementById(id);
            if (el) el.classList.toggle('active');
        }
    </script>
</body>
</html>
