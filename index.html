<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steamrip Hub | Infinite Discovery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <style>
        :root { 
            --bg: #0b0f1a; --card: #161b2c; --accent: #38bdf8; 
            --text: #f1f5f9; --hover: #1e293b; --success: #22c55e;
        }

        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); 
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        .container { width: 100%; max-width: 1200px; padding: 20px; box-sizing: border-box; }
        
        /* YouTube-Style Sticky Header */
        .header-sticky {
            position: sticky; top: 0; background: rgba(11, 15, 26, 0.95); 
            backdrop-filter: blur(10px); z-index: 1000;
            padding: 15px 0; width: 100%; display: flex; flex-direction: column; 
            align-items: center; border-bottom: 1px solid #2d3748;
        }

        .header-sticky h1 { 
            font-size: 1.8rem; margin: 0; color: var(--accent); cursor: pointer; 
            font-weight: 800; letter-spacing: -1px;
        }

        .search-area { 
            display: flex; gap: 10px; width: 90%; max-width: 500px; margin-top: 10px;
        }
        
        input { 
            flex: 1; padding: 12px 20px; background: #000; border: 1px solid #2d3748; 
            border-radius: 25px; color: white; outline: none; font-size: 15px; transition: 0.2s;
        }
        input:focus { border-color: var(--accent); background: var(--card); }

        /* Modern Grid */
        #results { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 20px; margin-top: 30px; width: 100%;
        }
        
        .game-item { 
            background: var(--card); border-radius: 12px; overflow: hidden; 
            border: 1px solid #2d3748; transition: transform 0.2s, border-color 0.2s; 
            cursor: pointer; display: flex; flex-direction: column;
        }
        .game-item:hover { transform: scale(1.04); border-color: var(--accent); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }

        .game-cover { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: #1e293b; }

        .game-content { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; }
        .game-title { font-weight: 700; font-size: 14px; line-height: 1.2; margin-bottom: 8px; height: 34px; overflow: hidden; }
        
        .details { display: none; padding-top: 10px; border-top: 1px solid #2d3748; font-size: 11px; color: #94a3b8; }
        .details.active { display: block; }
        
        .dl-button { 
            display: block; text-align: center; padding: 8px; background: var(--success); 
            color: white; text-decoration: none; border-radius: 6px; font-weight: 800; margin-top: 10px;
        }

        #sentinel { 
            height: 150px; display: flex; align-items: center; justify-content: center; 
            width: 100%; color: var(--accent); font-weight: 500; font-size: 14px;
        }

        /* Small surprise me floating button */
        .fab {
            position: fixed; bottom: 20px; right: 20px; background: var(--accent);
            color: black; width: 50px; height: 50px; border-radius: 25px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.4); z-index: 100;
        }
    </style>
</head>
<body>

    <div class="header-sticky">
        <h1 onclick="location.reload()">Steamrip Hub</h1>
        <div class="search-area">
            <input type="text" id="searchBox" placeholder="Type to search games...">
        </div>
    </div>

    <div class="container">
        <div id="results"></div>
        <div id="sentinel">
            <div class="spinner">Fetching more games...</div>
        </div>
    </div>

    <div class="fab" title="Surprise Me" onclick="surpriseMe()">🎲</div>

    <script>
        let allGames = [];
        let filteredGames = [];
        let fuse;
        let currentIndex = 0;
        const itemsPerPage = 30;
        const imageCache = JSON.parse(localStorage.getItem('steam_cache_final') || '{}');

        // Initial Load
        fetch('steamrip_games.json')
            .then(res => res.json())
            .then(data => {
                allGames = data.downloads;
                filteredGames = allGames;
                fuse = new Fuse(allGames, { keys: ['title'], threshold: 0.35 });
                loadNextBatch();
            });

        // The logic that fix the "Not Loading" issue
        const scrollObserver = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && allGames.length > 0) {
                loadNextBatch();
            }
        }, { rootMargin: '300px' }); // Load when the sentinel is 300px away

        scrollObserver.observe(document.getElementById('sentinel'));

        function loadNextBatch() {
            if (currentIndex >= filteredGames.length) {
                document.getElementById('sentinel').innerText = "You've seen them all!";
                return;
            }

            const nextBatch = filteredGames.slice(currentIndex, currentIndex + itemsPerPage);
            renderGames(nextBatch, currentIndex);
            currentIndex += itemsPerPage;

            // RECURSIVE CHECK: If we still haven't filled the screen, load more immediately
            setTimeout(() => {
                const sentinelPos = document.getElementById('sentinel').getBoundingClientRect();
                if (sentinelPos.top < window.innerHeight && currentIndex < filteredGames.length) {
                    loadNextBatch();
                }
            }, 100);
        }

        // Search Logic
        const searchBox = document.getElementById('searchBox');
        searchBox.addEventListener('input', (e) => {
            const query = e.target.value;
            currentIndex = 0;
            document.getElementById('results').innerHTML = '';
            
            if (query.length < 2) { 
                filteredGames = allGames;
            } else {
                filteredGames = fuse.search(query).map(r => r.item);
            }
            loadNextBatch();
        });

        function surpriseMe() {
            const random = allGames[Math.floor(Math.random() * allGames.length)];
            document.getElementById('results').innerHTML = '';
            currentIndex = 0;
            filteredGames = [random];
            loadNextBatch();
            setTimeout(() => toggleDetails(`details-0`), 200);
        }

        // Improved Image Finder
        function cleanNameForSteam(title) {
            return title.replace(/Free Download/gi, '')
                        .replace(/\(.*\)/g, '').replace(/\[.*\]/g, '')
                        .replace(/v\d+(\.\d+)*/g, '').split(':')[0].trim();
        }

        async function updateImage(imgElement, title) {
            const name = cleanNameForSteam(title);
            if (imageCache[name]) { imgElement.src = imageCache[name]; return; }

            try {
                // Try to find the App ID on Steam
                const searchUrl = `https://api.allorigins.win/get?url=${encodeURIComponent('https://store.steampowered.com/api/storesearch/?term=' + name + '&l=english&cc=US')}`;
                const res = await fetch(searchUrl);
                const data = await res.json();
                const contents = JSON.parse(data.contents);
                
                if (contents.items && contents.items.length > 0) {
                    const appId = contents.items[0].id;
                    const finalImg = `https://images.weserv.nl/?url=cdn.cloudflare.steamstatic.com/steam/apps/${appId}/header.jpg`;
                    imageCache[name] = finalImg;
                    localStorage.setItem('steam_cache_final', JSON.stringify(imageCache));
                    imgElement.src = finalImg;
                } else { throw new Error(); }
            } catch (e) {
                imgElement.src = `https://placehold.co/600x400/161b2c/38bdf8?text=${name.charAt(0)}`;
            }
        }

        function renderGames(games, baseIndex) {
            const container = document.getElementById('results');
            games.forEach((g, i) => {
                const idx = baseIndex + i;
                const div = document.createElement('div');
                div.className = 'game-item';
                div.onclick = () => toggleDetails(`details-${idx}`);
                div.innerHTML = `
                    <img class="game-cover" id="img-${idx}" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=">
                    <div class="game-content">
                        <div class="game-title">${g.title.replace(' Free Download', '')}</div>
                        <div id="details-${idx}" class="details">
                            <div>Size: ${g.file_size}</div>
                            <div>Genre: ${g.genre}</div>
                            <a href="${g.download_urls[0]}" target="_blank" class="dl-button">Download</a>
                        </div>
                    </div>
                `;
                container.appendChild(div);

                // Set up "Lazy Loading" for images
                const observer = new IntersectionObserver((entries) => {
                    if (entries[0].isIntersecting) {
                        updateImage(document.getElementById(`img-${idx}`), g.title);
                        observer.disconnect();
                    }
                });
                observer.observe(div);
            });
        }

        function toggleDetails(id) {
            const el = document.getElementById(id);
            if (el) el.classList.toggle('active');
        }
    </script>
</body>
</html>
