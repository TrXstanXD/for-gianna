<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steamrip Hub | Instant Search</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <style>
        :root { 
            --bg: #0b0f1a; --card: #161b2c; --accent: #38bdf8; 
            --text: #f1f5f9; --hover: #1e293b; --success: #22c55e;
        }

        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); 
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 900px; padding-bottom: 60px; }
        
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 0; color: var(--accent); }

        .search-area { 
            display: flex; gap: 12px; margin-bottom: 30px; position: sticky; 
            top: 10px; z-index: 100; background: var(--bg); padding: 10px 0;
        }
        input { 
            flex: 1; padding: 16px; background: var(--card); border: 2px solid #2d3748; 
            border-radius: 14px; color: white; outline: none; font-size: 16px;
        }
        input:focus { border-color: var(--accent); }

        .btn-surprise { 
            padding: 0 20px; border-radius: 14px; border: none; cursor: pointer; 
            font-weight: 700; background: var(--accent); color: #000;
        }

        .section-title { font-size: 12px; text-transform: uppercase; color: #64748b; margin: 20px 0 15px; letter-spacing: 2px; }
        
        #results { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        
        .game-item { 
            background: var(--card); border-radius: 18px; overflow: hidden; 
            border: 1px solid #2d3748; transition: 0.3s; cursor: pointer;
        }
        .game-item:hover { transform: translateY(-5px); border-color: var(--accent); }

        .game-cover { width: 100%; height: 140px; object-fit: cover; background: #1e293b; }

        .game-content { padding: 15px; }
        .game-title { font-weight: 700; font-size: 15px; margin-bottom: 10px; line-height: 1.3; }
        
        .details { display: none; padding-top: 12px; border-top: 1px solid #2d3748; font-size: 12px; }
        .details.active { display: block; }
        
        .meta-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .meta-label { color: #64748b; }
        
        .dl-button { 
            display: block; text-align: center; padding: 10px; background: var(--success); 
            color: white; text-decoration: none; border-radius: 8px; font-weight: 800; margin-top: 12px;
        }

        .status-bar { 
            position: fixed; bottom: 0; width: 100%; background: #000; 
            color: #64748b; font-size: 11px; padding: 5px; text-align: center; border-top: 1px solid #2d3748;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Steamrip Hub</h1>
            <p id="counter">Loading database...</p>
        </div>

        <div class="search-area">
            <input type="text" id="searchBox" placeholder="Search by name or genre...">
            <button class="btn-surprise" onclick="surpriseMe()">Surprise Me</button>
        </div>

        <div id="results"></div>
    </div>

    <div class="status-bar" id="statusBar">Connecting to Steamrip Database...</div>

    <script>
        let allGames = [];
        let fuse;
        const imageCache = JSON.parse(localStorage.getItem('steam_image_cache') || '{}');

        // 1. Fetch the data
        fetch('steamrip_games.json')
            .then(res => res.json())
            .then(data => {
                allGames = data.downloads;
                document.getElementById('counter').innerText = `${allGames.length.toLocaleString()} games available`;
                document.getElementById('statusBar').innerText = `Database Sync Complete. Ready for search.`;
                
                fuse = new Fuse(allGames, { 
                    keys: ['title', 'genre'], 
                    threshold: 0.3,
                    distance: 100
                });
            });

        // 2. Search Logic
        const searchBox = document.getElementById('searchBox');
        searchBox.addEventListener('input', (e) => {
            const query = e.target.value;
            if (query.length < 2) { 
                document.getElementById('results').innerHTML = ''; 
                return; 
            }
            const results = fuse.search(query).slice(0, 15);
            renderGames(results.map(r => r.item));
        });

        function surpriseMe() {
            const random = allGames[Math.floor(Math.random() * allGames.length)];
            renderGames([random]);
            const firstId = document.querySelector('.details').id;
            toggleDetails(firstId);
        }

        // 3. Image Engine with Caching
        async function updateImage(imgElement, title) {
            const cleanTitle = title.split(' Free Download')[0].split('(')[0].trim();
            
            // Check cache first
            if (imageCache[cleanTitle]) {
                imgElement.src = imageCache[cleanTitle];
                return;
            }

            try {
                const searchUrl = `https://api.allorigins.win/get?url=${encodeURIComponent('https://store.steampowered.com/api/storesearch/?term=' + cleanTitle + '&l=english&cc=US')}`;
                const response = await fetch(searchUrl);
                const data = await response.json();
                const steamResult = JSON.parse(data.contents);
                
                if (steamResult.items && steamResult.items.length > 0) {
                    const appId = steamResult.items[0].id;
                    const finalImg = `https://images.weserv.nl/?url=cdn.cloudflare.steamstatic.com/steam/apps/${appId}/header.jpg`;
                    
                    // Save to cache
                    imageCache[cleanTitle] = finalImg;
                    localStorage.setItem('steam_image_cache', JSON.stringify(imageCache));
                    
                    imgElement.src = finalImg;
                } else {
                    throw new Error();
                }
            } catch (e) {
                imgElement.src = `https://placehold.co/600x400/1e293b/38bdf8?text=${cleanTitle.charAt(0)}`;
            }
        }

        function renderGames(games) {
            const container = document.getElementById('results');
            container.innerHTML = games.map((g, i) => `
                <div class="game-item" onclick="toggleDetails('details-${i}')">
                    <img class="game-cover" id="img-${i}" src="https://placehold.co/600x300/161b2c/161b2c?text=..." alt="cover">
                    <div class="game-content">
                        <div class="game-title">${g.title.replace(' Free Download', '')}</div>
                        <div id="details-${i}" class="details">
                            <div class="meta-row"><span class="meta-label">Size</span><span>${g.file_size}</span></div>
                            <div class="meta-row"><span class="meta-label">Version</span><span>${g.version || 'Latest'}</span></div>
                            <div class="meta-row"><span class="meta-label">Genre</span><span>${g.genre || 'Action'}</span></div>
                            <a href="${g.download_urls[0]}" target="_blank" class="dl-button">Download Now</a>
                        </div>
                    </div>
                </div>
            `).join('');

            games.forEach((g, i) => updateImage(document.getElementById(`img-${i}`), g.title));
        }

        function toggleDetails(id) {
            const el = document.getElementById(id);
            if (el) el.classList.toggle('active');
        }
    </script>
</body>
</html>
