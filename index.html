<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEAMLINK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <style>
        :root { --bg: #0b0f1a; --card: #161b2c; --accent: #38bdf8; --text: #f1f5f9; --success: #22c55e; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header-sticky { position: sticky; top: 0; background: rgba(11, 15, 26, 0.95); backdrop-filter: blur(10px); z-index: 1000; padding: 15px 0; width: 100%; text-align: center; border-bottom: 1px solid #2d3748; }
        .header-sticky h1 { font-size: 1.8rem; margin: 0; color: var(--accent); cursor: pointer; }
        input { width: 90%; max-width: 500px; padding: 12px 20px; background: #000; border: 1px solid #2d3748; border-radius: 25px; color: white; outline: none; margin-top: 10px; font-size: 15px; }
        #results { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px; width: 100%; max-width: 1200px; box-sizing: border-box; }
        .game-item { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #2d3748; transition: 0.2s; cursor: pointer; display: flex; flex-direction: column; }
        .game-item:hover { transform: scale(1.04); border-color: var(--accent); }
        .game-cover { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: #1e293b; }
        .game-content { padding: 12px; flex-grow: 1; }
        .game-title { font-weight: 700; font-size: 14px; line-height: 1.2; height: 34px; overflow: hidden; }
        .details { display: none; padding-top: 10px; border-top: 1px solid #2d3748; font-size: 11px; color: #94a3b8; }
        .details.active { display: block; }
        .dl-button { display: block; text-align: center; padding: 8px; background: var(--success); color: white; text-decoration: none; border-radius: 6px; font-weight: 800; margin-top: 10px; }
        #sentinel { height: 100px; display: flex; align-items: center; justify-content: center; width: 100%; color: var(--accent); }
    </style>
</head>
<body>

    <div class="header-sticky">
        <h1 onclick="location.reload()">Use a VPN to download, wifi might block links!</h1>
        <input type="text" id="searchBox" placeholder="Search 10,000+ games...">
    </div>

    <div id="results"></div>
    <div id="sentinel">Loading more...</div>

    <script>
        let allGames = [];
        let filteredGames = [];
        let fuse;
        let currentIndex = 0;
        const itemsPerPage = 20;
        const imageCache = JSON.parse(localStorage.getItem('steam_cache_v5') || '{}');

        fetch('steamrip_games.json')
            .then(res => res.json())
            .then(data => {
                allGames = data.downloads;
                filteredGames = allGames;
                fuse = new Fuse(allGames, { keys: ['title'], threshold: 0.35 });
                loadNextBatch();
            });

        const scrollObserver = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && allGames.length > 0) loadNextBatch();
        }, { rootMargin: '400px' });
        scrollObserver.observe(document.getElementById('sentinel'));

        function loadNextBatch() {
            if (currentIndex >= filteredGames.length) return;
            const nextBatch = filteredGames.slice(currentIndex, currentIndex + itemsPerPage);
            renderGames(nextBatch, currentIndex);
            currentIndex += itemsPerPage;
        }

        // --- THE "DETECTIVE" LOGIC ---
        function cleanName(title) {
            return title.replace(/Free Download/gi, '')
                        .replace(/\(.*\)/g, '')   // Remove (v1.0)
                        .replace(/\[.*\]/g, '')   // Remove [Build]
                        .replace(/v\d+(\.\d+)*/g, '') // Remove v1.2.3
                        .split(':')[0]           // Take only the part before a colon
                        .trim();
        }

        async function updateImage(imgElement, title) {
            const name = cleanName(title);
            if (imageCache[name]) { imgElement.src = imageCache[name]; return; }

            // Stagger the requests so we don't hit the proxy all at once
            await new Promise(resolve => setTimeout(resolve, Math.random() * 1000));

            try {
                // Try Proxy 1
                const url = `https://api.allorigins.win/get?url=${encodeURIComponent('https://store.steampowered.com/api/storesearch/?term=' + name + '&l=english&cc=US')}`;
                const res = await fetch(url);
                const data = await res.json();
                const contents = JSON.parse(data.contents);
                
                if (contents.items && contents.items.length > 0) {
                    const appId = contents.items[0].id;
                    const finalImg = `https://images.weserv.nl/?url=cdn.cloudflare.steamstatic.com/steam/apps/${appId}/header.jpg`;
                    imageCache[name] = finalImg;
                    localStorage.setItem('steam_cache_v5', JSON.stringify(imageCache));
                    imgElement.src = finalImg;
                } else { throw new Error(); }
            } catch (e) {
                // Fallback to letter
                imgElement.src = `https://placehold.co/600x400/161b2c/38bdf8?text=${name.charAt(0)}`;
            }
        }

        function renderGames(games, baseIndex) {
            const container = document.getElementById('results');
            games.forEach((g, i) => {
                const idx = baseIndex + i;
                const div = document.createElement('div');
                div.className = 'game-item';
                div.onclick = () => document.getElementById(`details-${idx}`).classList.toggle('active');
                div.innerHTML = `
                    <img class="game-cover" id="img-${idx}" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=">
                    <div class="game-content">
                        <div class="game-title">${g.title.replace(' Free Download', '')}</div>
                        <div id="details-${idx}" class="details">
                            <div>Size: ${g.file_size}</div>
                            <a href="${g.download_urls[0]}" target="_blank" class="dl-button">Download</a>
                        </div>
                    </div>
                `;
                container.appendChild(div);

                // Only search for image when it's actually visible
                const observer = new IntersectionObserver((entries) => {
                    if (entries[0].isIntersecting) {
                        updateImage(document.getElementById(`img-${idx}`), g.title);
                        observer.disconnect();
                    }
                });
                observer.observe(div);
            });
        }

        searchBox.addEventListener('input', (e) => {
            currentIndex = 0; document.getElementById('results').innerHTML = '';
            filteredGames = e.target.value.length < 2 ? allGames : fuse.search(e.target.value).map(r => r.item);
            loadNextBatch();
        });
    </script>
</body>
</html>
