<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SteamLinks</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <style>
        :root { --bg: #0b0f1a; --card: #161b2c; --accent: #38bdf8; --text: #f1f5f9; --success: #22c55e; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 1100px; }
        .header-sticky { position: sticky; top: 0; background: var(--bg); z-index: 1000; padding: 10px 0 20px; width: 100%; text-align: center; }
        .header-sticky h1 { font-size: 2.2rem; margin: 0; color: var(--accent); letter-spacing: -1px; }
        input { width: 100%; max-width: 500px; padding: 14px 20px; background: var(--card); border: 2px solid #2d3748; border-radius: 30px; color: white; outline: none; margin-top: 15px; font-size: 16px; }
        input:focus { border-color: var(--accent); }
        #results { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .game-item { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #2d3748; transition: 0.2s; cursor: pointer; position: relative; }
        .game-item:hover { transform: translateY(-5px); border-color: var(--accent); }
        .game-cover { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: #1e293b; display: block; }
        .game-content { padding: 12px; }
        .game-title { font-weight: 700; font-size: 13px; line-height: 1.2; height: 32px; overflow: hidden; }
        .details { display: none; padding-top: 10px; border-top: 1px solid #2d3748; font-size: 11px; color: #94a3b8; }
        .details.active { display: block; }
        .dl-button { display: block; text-align: center; padding: 8px; background: var(--success); color: white; text-decoration: none; border-radius: 6px; font-weight: 800; margin-top: 10px; }
        #sentinel { height: 100px; display: flex; align-items: center; justify-content: center; width: 100%; color: var(--accent); font-size: 14px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-sticky">
            <h1>SteamLinks</h1>
            <input type="text" id="searchBox" placeholder="Search 10,000+ games...">
        </div>
        <div id="results"></div>
        <div id="sentinel">Sorry it takes a while to load...</div>
    </div>

    <script>
        let allGames = [];
        let filteredGames = [];
        let fuse;
        let currentIndex = 0;
        const itemsPerPage = 30;
        const imageCache = JSON.parse(localStorage.getItem('steam_cache_v4') || '{}');

        fetch('steamrip_games.json')
            .then(res => res.json())
            .then(data => {
                allGames = data.downloads;
                filteredGames = allGames;
                fuse = new Fuse(allGames, { keys: ['title'], threshold: 0.3 });
                loadNextBatch();
            });

        // Intersection Observer for Infinite Scroll
        const scrollObserver = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting) loadNextBatch();
        }, { rootMargin: '400px' });
        scrollObserver.observe(document.getElementById('sentinel'));

        function loadNextBatch() {
            if (currentIndex >= filteredGames.length) return;
            const nextBatch = filteredGames.slice(currentIndex, currentIndex + itemsPerPage);
            renderGames(nextBatch);
            currentIndex += itemsPerPage;
        }

        // The "Super-Cleaner" for Titles
        function cleanTitle(title) {
            return title
                .replace(/Free Download/gi, '')
                .replace(/\(.*\)/g, '') // Remove (v1.0)
                .replace(/\[.*\]/g, '') // Remove [Build x]
                .replace(/v\d+(\.\d+)*/g, '') // Remove v1.2.3
                .split(':')[0] // Steam search likes just the main name
                .trim();
        }

        async function fetchSteamImage(imgElement, title) {
            const name = cleanTitle(title);
            if (imageCache[name]) { imgElement.src = imageCache[name]; return; }

            // Try different proxies if one fails
            const proxies = [
                `https://api.allorigins.win/get?url=`,
                `https://corsproxy.io/?`
            ];

            for (let proxy of proxies) {
                try {
                    const searchUrl = `${proxy}${encodeURIComponent('https://store.steampowered.com/api/storesearch/?term=' + name + '&l=english&cc=US')}`;
                    const res = await fetch(searchUrl);
                    const data = await res.json();
                    const contents = data.contents ? JSON.parse(data.contents) : data; // Handle different proxy formats
                    
                    if (contents.items && contents.items.length > 0) {
                        const appId = contents.items[0].id;
                        const imgUrl = `https://images.weserv.nl/?url=cdn.cloudflare.steamstatic.com/steam/apps/${appId}/header.jpg`;
                        imageCache[name] = imgUrl;
                        localStorage.setItem('steam_cache_v4', JSON.stringify(imageCache));
                        imgElement.src = imgUrl;
                        return; // Success!
                    }
                } catch (e) { continue; }
            }
            // Fallback
            imgElement.src = `https://placehold.co/600x400/161b2c/38bdf8?text=${name.charAt(0)}`;
        }

        function renderGames(games) {
            const container = document.getElementById('results');
            games.forEach((g, i) => {
                const id = `item-${currentIndex + i}`;
                const div = document.createElement('div');
                div.className = 'game-item';
                div.innerHTML = `
                    <img class="game-cover" data-src="${g.title}" id="img-${id}" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=">
                    <div class="game-content">
                        <div class="game-title">${g.title.replace(' Free Download', '')}</div>
                        <div id="details-${id}" class="details">
                            <div>Size: ${g.file_size}</div>
                            <a href="${g.download_urls[0]}" target="_blank" class="dl-button">Download</a>
                        </div>
                    </div>
                `;
                div.onclick = () => document.getElementById(`details-${id}`).classList.toggle('active');
                container.appendChild(div);
                
                // Lazy Load Images only when visible
                const img = div.querySelector('img');
                const imgObserver = new IntersectionObserver((entries) => {
                    if (entries[0].isIntersecting) {
                        fetchSteamImage(img, g.title);
                        imgObserver.disconnect();
                    }
                });
                imgObserver.observe(img);
            });
        }

        searchBox.addEventListener('input', (e) => {
            currentIndex = 0;
            document.getElementById('results').innerHTML = '';
            filteredGames = e.target.value.length < 2 ? allGames : fuse.search(e.target.value).map(r => r.item);
            loadNextBatch();
        });
    </script>
</body>
</html>
